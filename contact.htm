<!DOCTYPE html>
<html>
<!-- This page is devoted giving contact information to the user if they need to report a bug or contact the developer for any reason-->
<head>
    <!--Page Title, shows in browser as the tab name-->
    <title>Contact Page</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--Link to jquery through google repository as the link to the jquery site is blocked by Github. Using the code.jquery site on github does not allow jquery.min to function.-->
    <link rel="stylesheet" href="js/jquery.mobile-1.4.5.css">
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
    <script type="text/javascript" src="js/jquery.mobile-1.4.5.min.js"></script>


</head>

<body>
    <div data-role="page">

        <!--Header-->
        <div data-role="header">
            <h1>Contact Us</h1>
            <!--Link to home document and its accompanying prefetch, and transition information-->
            <a href="index.htm" data-icon="home" class="ui-btn-right">Home</a>
        </div>

        <div role="main" class="ui-content">
            <p> 

                <!-- #2 This is the basis of my input fields for a client to send in a question comment or concern to our customer
                service team. The fields consist of standard lable fields and input types, as well as a textarea for inputing a lot of text-->
                <center>Have any questions or would like to sudgest an edit? Please do so with this form! <br>
                We only require your first name and email, as if it is a concern we would like to able to address it with you.<br></center>

                <form action="echo.html" method="post">
                <div class="ui-field-contain">
                    <label for="name">Name:</label>
                    <input type="text" name="name" id="name" value="" />
                </div>

                <div class="ui-field-contain">
                    <label for="name">Email:</label>
                    <input type="text" name="email" id="email" value="" />
                </div>

                <div class="ui-field-contain">
                    <label for="name">Question, Comment, or Concern:</label>
                    <textarea name="qcc" id="qcc"></textarea>
                </div>
                
                <div class="ui-field-contain">
                    <input type="submit" name="submit" value="Send" />
                </div> 
                </form>

            </p>
        </div>

        <!--Footer for fun-->
        <div data-role="footer">
            <p>
                Matt's Moving Planner.<br>
                <i><b><small>Makin Moving Easier Since 99!</small></b></i>
            </p>
        </div>
        
    </div>
</body>

</html>
